syntax = "proto3";

package auth.v1;

import "google/protobuf/timestamp.proto";
import "options/v1/options.proto";

option go_package = "github.com/pivaldi/mmw-contracts/gen/go/auth/v1;authv1";

// AuthPublicService exposes endpoints reachable by unauthenticated clients.
service AuthPublicService {
  // Register creates a new user account.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Login authenticates a user and returns a session token.
  rpc Login(LoginRequest) returns (LoginResponse);

  // ChangePassword updates a user's password after verifying the old one.
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);

  // DeleteUser removes a user from the system.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

// AuthPrivateService exposes endpoints reachable only by internal services.
service AuthPrivateService {
  // ValidateToken checks if a token is valid and returns the user's identity.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

// --- Register ---

message RegisterRequest {
  string login = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
}

// --- Login ---

message LoginRequest {
  string login = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  string user_id = 2;
}

// --- ValidateToken ---

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  bool is_valid = 2;
}

// --- ChangePassword ---

message ChangePasswordRequest {
  string user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message ChangePasswordResponse {}

// --- DeleteUser ---

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {}

// --- Shared types ---

// User represents a user account.
message User {
  string id = 1;
  string login = 2;
}

// UserRegisteredEvent is published when a new user account is created.
message UserRegisteredEvent {
  option (options.v1.topic) = "auth.user.registered.v1";
  string user_id = 1;
  google.protobuf.Timestamp registered_at = 2;
}

// UserDeletedEvent is published to the message bus when a user account is deleted.
message UserDeletedEvent {
  option (options.v1.topic) = "auth.user.deleted.v1";
  string user_id = 1;
  google.protobuf.Timestamp deleted_at = 2;
}

// PasswordChangedEvent is published when a user successfully changes their password.
message PasswordChangedEvent {
  option (options.v1.topic) = "auth.user.password_changed.v1";
  string user_id = 1;
  google.protobuf.Timestamp changed_at = 2;
}

// UserLoggedInEvent is published when a user authenticates successfully.
message UserLoggedInEvent {
  option (options.v1.topic) = "auth.user.logged_in.v1";
  string user_id = 1;
  google.protobuf.Timestamp logged_in_at = 2;
}

// AuthErrorCode enumerates all domain errors for the auth module.
// Shared between Go (via platform.ErrorCode cast) and TypeScript (via generated enum).
enum AuthErrorCode {
  AUTH_ERROR_CODE_UNSPECIFIED = 0;
  // Validation
  AUTH_ERROR_CODE_INVALID_LOGIN = 1;
  AUTH_ERROR_CODE_INVALID_PASSWORD = 2;
  // Authentication
  AUTH_ERROR_CODE_INVALID_CREDENTIALS = 3;
  AUTH_ERROR_CODE_INVALID_TOKEN = 4;
  // Resources
  AUTH_ERROR_CODE_USER_NOT_FOUND = 5;
  AUTH_ERROR_CODE_USER_ALREADY_EXISTS = 6;
}
